<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>账单详情</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            width: 100%;
            max-width: 414px;
            padding: 20px 16px 30px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card {
            background-color: #ffffff;
            border: 1px solid #f2f2f2;
            border-radius: 16px;
            padding: 30px 20px 16px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }

        .merchant-icon-container {
            width: 52px;
            height: 52px;
            background-color: #eb6825;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .merchant-icon-svg {
            width: 28px;
            height: 28px;
            fill: #ffffff;
        }

        .merchant-name {
            font-size: 15px;
            color: #333333;
            margin-bottom: 8px;
        }

        .amount {
            font-size: 40px;
            font-weight: 500;
            color: #000000;
            margin-bottom: 6px;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        .status {
            font-size: 14px;
            color: #888888;
            margin-bottom: 32px;
        }

        .detail-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 20px;
        }

        .row {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            font-size: 15px;
            line-height: 1.4;
        }

        .label {
            color: #9a9a9a;
            width: 105px;
            flex-shrink: 0;
        }

        .value {
            color: #333333;
            text-align: left;
            flex-grow: 1;
            word-break: break-all;
        }
        
        .red-row .label,
        .red-row .value {
            color: #ff3b30 !important; 
        }
        
        .value .arrow {
            color: #b2b2b2;
            margin-left: 4px;
            font-family: "SimSun", sans-serif;
            font-size: 13px;
        }

        .reward-row {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-top: -4px;
            margin-bottom: 16px;
        }
        .reward-btn {
            display: inline-flex;
            align-items: center;
            color: #ff8200;
            font-size: 14px;
            background-color: #fff7eb;
            border: none;
            padding: 4px 10px;
            border-radius: 12px;
        }
        .reward-icon {
            width: 14px;
            height: 14px;
            background-color: #ffb400;
            color: #ffffff;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 5px;
            font-weight: bold;
        }

        .more-btn {
            font-size: 14px;
            color: #999999;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .more-btn::after {
            content: "";
            display: inline-block;
            width: 7px;
            height: 7px;
            border-right: 1px solid #aaa;
            border-bottom: 1px solid #aaa;
            transform: rotate(45deg);
            margin-bottom: 3px;
        }

        .mgt-card {
            background-color: #ffffff;
            border: 1px solid #f2f2f2;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }
        .mgt-title {
            font-size: 15px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 14px;
        }
        .banner {
            background-color: #fff9f0;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .banner-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .banner-text {
            font-size: 14px;
            color: #666666;
        }
        .banner-text span {
            color: #ff8200;
        }
        .banner-arrow {
            color: #ccc;
            font-family: "SimSun", sans-serif;
        }

        .cat-card {
            background-color: #ffffff;
            border: 1px solid #f2f2f2;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }
        .cat-title {
            font-size: 15px;
            color: #000000;
        }
        .cat-value {
            font-size: 14px;
            color: #999999;
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="merchant-icon-container">
                <svg class="merchant-icon-svg" viewBox="0 0 24 24">
                    <path d="M4 18h16v2H4zm1-8h14l1 6H4zm2.5-6h9l.5 3h-10z"/>
                    <circle cx="7.5" cy="13" r="1" fill="#eb6825"/>
                    <circle cx="12" cy="13" r="1" fill="#eb6825"/>
                    <circle cx="16.5" cy="13" r="1" fill="#eb6825"/>
                </svg>
            </div>
            <div class="merchant-name">城发橘子洲</div>
            <div class="amount" id="main-amount">0.00</div>
            <div class="status">交易成功</div>

            <div class="detail-box">
                <div class="row">
                    <div class="label">订单金额</div>
                    <div class="value" id="order-amount">0.00</div>
                </div>
                <div class="row red-row">
                    <div class="label">碰友日立减</div>
                    <div class="value" id="discount-amount">0.00</div>
                </div>
                <div class="row">
                    <div class="label">支付时间</div>
                    <div class="value" id="pay-time">---- --:--:--</div>
                </div>
                <div class="row">
                    <div class="label">付款方式</div>
                    <div class="value">支付宝小荷包(日常小开支) <span class="arrow">&gt;</span></div>
                </div>
                <div class="row">
                    <div class="label">商品说明</div>
                    <div class="value">支付订单:环全洲游览线（可直达毛泽东青年艺术雕塑站，含往返）--购票</div>
                </div>
            </div>

            <div class="reward-row">
                <div class="label">支付奖励</div>
                <div class="reward-btn">
                    <span class="reward-icon">v</span>立即领取4积分
                </div>
            </div>

            <div class="detail-box" style="border-top: 1px dashed #f5f5f5; padding-top: 16px;">
                <div class="row">
                    <div class="label">收单机构</div>
                    <div class="value">兴业银行股份有限公司</div>
                </div>
                <div class="row">
                    <div class="label">清算机构</div>
                    <div class="value">中国银联股份有限公司</div>
                </div>
                <div class="row">
                    <div class="label">收款方全称</div>
                    <div class="value">长沙城发橘子洲旅游服务开发有限责任公司</div>
                </div>
            </div>

            <div class="more-btn">更多</div>
        </div>

        <div class="mgt-card">
            <div class="mgt-title">账单管理</div>
            <div class="banner">
                <div class="banner-left">
                    <div class="banner-icon">🧻</div>
                    <div class="banner-text">你因这笔消费解锁了<span>“日用百货”</span>贴纸</div>
                </div>
                <div class="banner-arrow">&gt;</div>
            </div>
        </div>

        <div class="cat-card">
            <div class="cat-title">账单分类</div>
            <div class="cat-value">日用百货 <span class="banner-arrow">&gt;</span></div>
        </div>
    </div>

    <script>
        (function() {
            // 1. 动态同步北京日期
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const fixedTime = "17:06:06";
            document.getElementById("pay-time").innerText = `${year}-${month}-${date} ${fixedTime}`;

            // 封装核心的随机生成与联动函数
            function doRandomBill() {
                // 2. 随机订单金额 (40 或 20)
                const orderOptions = [20.00, 40.00];
                const selectedOrder = orderOptions[Math.floor(Math.random() * orderOptions.length)];
                
                // 3. 随机立减 (0.00 到 1.00 之间)
                const randomDiscount = parseFloat(Math.random().toFixed(2));
                
                // 4. 精准计算核心支付金额
                const finalAmount = ((selectedOrder * 100) - (randomDiscount * 100)) / 100;

                // 5. 更新到 DOM
                document.getElementById("order-amount").innerText = selectedOrder.toFixed(2);
                document.getElementById("discount-amount").innerText = `-${randomDiscount.toFixed(2)}`;
                document.getElementById("main-amount").innerText = finalAmount.toFixed(2);
            }

            // 核心修改：每次加载页面时，连续执行两次随机逻辑
            doRandomBill(); // 第1次执行

            setTimeout(function() {
                doRandomBill(); // 第2次执行（延迟50毫秒，确保两次独立运行落定结果）
            }, 50);
        })();
    </script>
</body>
</html>
